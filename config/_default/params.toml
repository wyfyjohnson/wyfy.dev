# Key homepage settings - add/update these in your params.toml

colorScheme = "blowfish"
defaultAppearance = "dark"
autoSwitchAppearance = true

[homepage]
  layout = "hero" # Options: page, profile, hero, card, background, custom
  homepageImage = "/images/splash-bg.jpg" # Your splash background image
  showRecent = false # Don't show recent posts on splash page
  showRecentItems = 0 # Set to 0 to hide posts completely
  showMoreLink = false
  layoutBackgroundBlur = false # Set to true for blurred background effect

[hero]
  # Hero specific settings
  showTitle = true
  showDescription = true
  imageHeight = "100vh" # Full viewport height
  imagePosition = "center" # center, top, bottom
  
# Alternatively, for a minimalist splash, use 'profile' layout:
# [homepage]
#   layout = "profile"
#   showRecent = false

# Or for full background image control, use 'background':
# [homepage]
#   layout = "background"
#   homepageImage = "/images/splash.jpg"
#   layoutBackgroundBlur = true
#   layoutBackgroundHeaderSpace = false
