baseURL = 'https://wyfy.dev'
languageCode = 'en-us'
title = 'My Personal Website'

# Theme configuration (adjust based on your chosen theme)
 theme = 'Blowfish'

[params]
  author = "Wyatt Johnson"
  description = "My personal website and blog"
  keywords = ["blog", "personal", "website"]
  
  # Social links
  [[params.social]]
    name = "Codeberg"
    url = "https://codeberg.org/wyfy"
  
  [[params.social]]
    name = "Polymaths"
    url = "https://polymaths.social/@wyatt"

[menu]
  [[menu.main]]
    identifier = "home"
    name = "Home"
    url = "/"
    weight = 10
  
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 20
  
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 30

# Syntax highlighting
[markup]
  [markup.highlight]
    style = 'monokai'
    lineNos = true
    lineNumbersInTable = true
    
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true  # Allow raw HTML in markdown

# Output formats
[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]

# Permalinks
[permalinks]
  posts = '/posts/:year/:month/:slug/'
  
# Privacy settings
[privacy]
  [privacy.googleAnalytics]
    anonymizeIP = true
    respectDoNotTrack = true
  [privacy.youtube]
    privacyEnhanced = true
